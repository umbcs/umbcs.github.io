- category: "Account Management"
  questions:
    - question: "1: How do I choose a password?"
      answer: "Starting in March 2021, the Computer Science department imposed a new password policy. Your password must have:

          1) Between 10 And 128 Characters.
          2) At Least Two Uppercase Letters.
          3) At Least Two Lowercase Letters.
          4) At Least Two Numerical Digits.
          5) At Least Two Special Symbols (!$%#^@&*_+ etc.)
 
          One way to choose an OK password is to pick a phrase or song and use the first letters of the words, with some non-letter characters.
          Do not confuse 'dictionary' with say the Webster's dictionary.

          Cracking software comes with huge lists of words in many languages, real and imaginary, and English transliterations of languages in other alphabets: Russian, Mandarin, Swahili, Vietnamese, Arabic, Farsi, Hindi; all the words in the Koran; the CIA World Factbook's list of every place name in the world; car names, people names, botanical names, science fiction names, Klingon words; and just about anything you could think of. If it has been written down anywhere in the world, it's probably in a cracking dictionary.

          **Any** password derived from **any** dictionary word (or personal information), modified in **any** way, constitutes a potentially guessable password."

    - question: "2: How do I get a Windows account in the lab?"
      answer: "Windows accounts and Linux accounts use the same kerberos system for authentication. Your Linux and Windows username and password are the same. You only have one password. If you change your password on a Linux Desktop or a Linux server, users.cs.umb.edu for example, your Windows password will change too. If you change your password from a Windows PC in any of the CS Labs, your Linux password will change too. You will also be able to change your password yourself from the CS Portal at the URL: 'https://portal.cs.umb.edu'.
 
          See the previous question for the CS department new password policy."

    - question: "3: How do I get a Linux account for my course?"
      answer: "User course accounts are created through the CS department Portal. The URL is 'https://portal.cs.umb.edu'.

          The CS department Portal provides the following services to the user commnunity:

            o Create new/modify user's Portal account.
            o Create new Linux/Windows user account.
            o Register for courses accounts - CS/IT students must do this for each new semester.
            o Reset Linux/Windows user password.
            o Reset user's Portal password.

          Note - If a user changes their password from users.cs.umb.edu, their Linux/Windows password will be set to that new password. Their Portal password will not change.
          If a user changes their password from the Portal, their Linux/Windows and Portal password will be set to that new password.

          Never share your password with **anyone**.  We mean it. We have a strict one-account, one-user policy. We can help you communicate with other systems and share group files without sharing passwords. If you share your password you might lose your Linux/Windows account.

          Send email to 'operator@cs.umb.edu' if you have any additional questions."

    - question: "4: How do I get a UNIX account for my course?"
      answer: "We have a web based application system but it is important to know that the web account that you use to log into portal.cs.umb.edu is separate than a UNIX account. The web account is like a gateway to manage your UNIX account but they are separate. For example, if you were to change your password on your web account, your UNIX account will remain with the same previous password until you log in through ssh and change it using yppasswd on any of our public hosts. See an operator if you have any additional questions.

          To get a UNIX account for your course there are three scenarios you could be in: you already have an existing UNIX account but have never seen the new web-based application system, you are a new student that needs a new account or you have both a web account and UNIX account.

          Existing UNIX account owner
          If you already have a Unix account but have not registered with the new Apply program you must go to Portal to register. Be sure to click the checkbox labeled “Select if you already have a Unix account” you will then need to enter your account’s username and password along with your UMB email address. If your username and password match a Unix account you will receive an email at your UMB email address for confirmation. When you click the link in that email you will be registered and will then be able to select your courses for the semester currently available

          New students to the departement
          The process is very similar to the one above except that you won’t be checking off the box labeled “Select if you already have a Unix account”. Head over to Portal to register. Enter the fields requested along with your UMB email address. We will be checking that the username you requested does not match an existing Unix account, in the case that the username is already taken you will be asked to enter another one. Once you have pressed submit you will receive an email at the UMB email address you provided for confirmation. When you click the link in that email you have successfully submitted a request for a new account and will then be able to select your courses for the semester currently available.

          Returning User with both web and system account
          If you have both accounts you can simply head over to https://portal.cs.umb.edu/registration/login/ and login to sign up for courses.

          New PhD student
          New PhD student must go through the same process as ‘New students to the departement’ for the creation of an account as an undergrad. Once you have an account you have to send a request to operator ‘at’ cs.umb.edu to be promoted to phd student status.

          See an operator if you have any additional questions or problems."

    - question: "5: How do I get an alumni account?"
      answer: "The Department Computer Science at UMass Boston supplies accounts to enrolled students, to graduates of the CS program, and to faculty and research associates.

          If your account is currently shut off, we will re-enable it while you either (1) apply for an alumni account as below, or (2) copy out your files before the account is deleted. Please advise us which you will do, by sending email to operator@cs.umb.edu.

          Alumni accounts must be authenticated, and have a valid address. We invite and require you to authenticate yourself by U.S. Mail. Please mail us a photocopy of your driver’s license (in lieu of National ID Card), or your passport or some official picture ID. You should obliterate your SSAN, as we don’t want to know it.

          Mark your photocopy with (1) your login name, (2) the date and type of degree you received from UMass Boston, and (3) your current U.S. Mail address. Mail to:

          Computer Science Alumni Sysadmin
          UMass-Boston
          100 Morrissey Blvd.
          Boston, MA 02125-3393

          We will keep your info off-line, but may share it with the Alumni Office so they can beg you for money

          The lab directors have required authentication since Nov. 1, 2002. Users who registered have valid login shells. Other old friends do not, and unused accounts get deleted routinely. Please keep your account active by logging in to alumni.cs.umb.edu at least every quarter-year, and keep your mailbox small."

- category: "Remote Access & Connectivity"
  questions:
    - question: "6: How do I log on to the CS networks from off-site?"
      answer: "Use Secure Shell (ssh) to connect to 'users.cs.umb.edu'.

          For Windows users:

          We recommend the following free ssh client console/file transfer packages:

          [PuTTY] (https://www.puttyssh.org).
          [Bitvise] (https://www.bitvise.com/ssh-client-download).

          For Mac users:

          We recommend the Terminal application that comes with the Mac."

    - question: "7: Is there wireless access in the Linux lab?"
      answer: "Yes, there is WiFi access through out the Campus. To connect, you will need you UMB email and password.
          For more information go to: https://www.umb.edu/it/wifi"

    - question: "8: How do I use remote (IMAP/POP) mail service?"
      answer: "If you have an internet connection, you can retrieve your mail from our mail machine using Microsoft Outlook, Netscape, Eudora, or any other PC mail client. See your software for instructions.

          Our POP server is at pop.cs.umb.edu. Our IMAP server is at imap.cs.umb.edu. Our SMTP server is at smtp.cs.umb.edu.

          Please use these aliases as they are guaranteed to work.

          Our POP and IMAP Servers are not reachable directly from the internet. As a CS users you can tunnel these protocols.

          Our SMTP server only handles outbound mail for clients on our LAN. Please do not configure your client to use it from home, unless our postmaster has told you to do so: your mail will be refused, and the log messages are annoying. If your internet connection is through an ISP, please use their SMTP server for your outbound mail. If they don’t offer one, get another ISP. We might make an exception in an extreme case, but we haven’t had to yet, since all ISP’s so far have SMTP servers."

- category: "Storage & File Management"
  questions:
    - question: "9: How do I transfer files to/from my PC?"
      answer: "Use sftp, the secure version of the File Transfer Protocol. A PC client program, psftp, comes along with PuTTY."

    - question: "10: How do I avoid trouble from disk quotas?"
      answer: "Disk space is a perpetual problem. Nice users can run out of space because others use way too much disk. Therefore we impose disk quotas on student homes and mailboxes.

          Note that disk space is provided separately for CS courses and PhD research, so that stuff doesn’t count against home usage.

          Homes

          All student homes must use less than 256 Mb of disk. All alumni homes must use less than 50 Mb of disk. The lab directors may refine their policy on quota values (up or down), at any time. Please go through the next question, on how to manage your usage.

          Mailboxes

          All student mailboxes must use less than 2 Mb of disk. In the mail spool, we will impose on students a soft quota of 2 Mb, and a hard quota of 5 Mb. That means you will be warned if you go over 2 Mb, and that your mail will bounce if you go over 5 Mb. If necessary, ask an operator how to save mail under your home, or to your PC.

          The Quota Mechanism

          There are two limits associated with each user, per filesystem: the soft limit and the hard limit. When usage exceeds the soft limit, you see messages to reduce usage. When usage exceeds the hard limit, you cannot write to your files. The system will not allow a user to exceed his or her hard limit. However, a system administrator may set a soft limit (sometimes referred to as a quota) which can be temporarily exceeded by the user. The soft limit must be less than the hard limit.

          Once the user exceeds the soft limit a timer begins. While the timer is ticking, the user is allowed to operate above the soft limit but cannot exceed the hard limit. Once the user goes below the soft limit, the timer gets reset. However, if the user’s usage remains above the soft limit when the timer expires, the soft limit is enforced as a hard limit. By default, the soft limit timer is seven days. The value of the timer is shown by the timeleft field in the quota command.

          For example, let’s say a user has a soft limit of 10,000 blocks and a hard limit of 12,000 blocks. If the user’s block usage exceeds 10,000 blocks and the timer is also exceeded (more than seven days), the user will not be able to allocate more disk blocks on that file system until his or her usage drops below the soft limit.

          Reducing Disk Space Usage

          It is a big win to compress text files with gzip.
          See man gzip.
          Also, you should be copying files out to your PC or USB drive.

          Over Quota

          At login time, before the prompt is displayed, you may see a message from the quota command about being over and having to reduce your usage by so much. You can see that any time by running the quota command. If you are over your hard limit and cannot write into your home or mailbox, recall that each host has a /tmp directory where you can do scratch work. This can help you examine archives or compressed files that you cannot uncompress in your home. Also recall that your mailbox is an ordinary file, /var/spool/mail/$USER that you can copy from and to. Thank you for your cooperation towards fairness and better service for all.

          Nobackup Area

          The NoBackup Area is a terabyte available for storing big files. Per its name, it does not get backed up. You can use this space by making your own directory by doing the following:
          cd /nobackup/students
          mkdir <username>

          Change the directory permissions to be unavailable to others, since it is a shared space: chmod 700 (username)"

    - question: "11: How do I check my disk usage on a Linux machine?"
      answer: "You can check your disk usage with the 'du' command. See 'man du'. The main thing to know is that the '-s' flag gives a sum for a subtree without showing every subdir in it.

          du -sh ~
          K/M/G   /home/$USER

          du -h --max-depth=1 ~

          To see the size of files in the current directory use the following command: 

          ls -sh

          This will not show the size of an entire directory, use the du command for that.

          To remove any directories that too are big and are just taking up space like the '.mozilla' and '.cache' you can use the following command:

          rm -rf 

          You can also remap your .cache directory to go into a nobackup space which does not affect your disk quota.

          Copy and paste the commands shown below into a terminal session to do that:

          cd ~
          rm -rf .cache
          mkdir -p /nobackup/students/$USER/.cache
          ln -s !$ .cache
          chmod 700 /nobackup/students/$USER

        **This will delete the entire directory and its content, please verify that there is nothing important before executing.**"

    - question: "12: How do I get a file restored from backup?"
      answer: "We do tape backups daily, in the dark of night. To request a file restore, send email to 'operator@cs.umb.edu' with the following information.

          For current work, including course directories:

          1. The name of the file.
          2. What directory the file was in.
          3. When you last edited the file, or saw it in good condition; yesterday, last month, etc.
          4. A file created during the day and deleted shortly thereafter is **gone**. It cannot be restored.

          An operator will restore the file(s) into the directory 'RESTORE' under your home, usually by the next business day.
          Please recover from there what you need, and delete what you don't. 

          A grace period of a week is usually granted before the RESTORE directory gets deleted under your home (unless you have already done so).

          We recommend you do your backup (sftp, scp to your own storage devices)."

    - question: "13: How do I keep from losing my important files?"
      answer: "Please know: we don’t promise to keep all your homework archived for you forever. Do occasionally make your own back up to a USB.

          Short Term
          Backups are usually done around 00:30. A file created during the day and deleted shortly thereafter is gone. We cannot restore it. You might copy very critical course files to your home, since homes and courses are generally on different disks. You might use a script to copy a file to your home before you edit it, like many examples to be found on the net.

          Long Term
          You should be copying files out to your own PC and/or to your own flash drive and such. By your files we mean your home, web page, homework, etc. The zip command makes nicely portable, compressed archives. We routinely trash old semester trees to make room for new classes, so clean up and copy out the stuff that is precious to you. Do it on some schedule but especially at the end of semester"

- category: "Lab Resources & Hardware"
  questions:
    - question: "14: How do I print?"
      answer: "Once you have a Unix and Windows account, the CS department automatically grants you 250 pages to print on the printer lj-158 we host per semester.

          You can check your quota status in the computer lab by going to cups2.cs.umb.edu.

          How to print to the student laser printer(s) (e.g. lj-158) can vary depending on the environment (Windows or Linux) you are currently on.

          If you are on a linux machine in the Unix/PC lab or connected to one of our servers you can use the lpr command.
          lpr <filename or file path>

          If you are on one of our Windows machines and are about to print something like a .pdf document, please read the windows dialog boxes and make sure that there is nothing out of the ordinary. Open the printable file and on that window: hold down Ctrl-P
          Useful Commands Let say that you are on one of our Unix labs machines and you sent a print job and it still has not printed. You can check the printer queue by using;

          lpq -a

          If you don’t want to wait and want to take your print job off the queue you can run:

          lprm -P lj-158 <job id>

          For the windows side to delete your file do the following:

          Click Start –> Devices and Printers –> Double Click the printer to see queue, Right Click your job and click Cancel to take it off the queue."

    - question: "15: Can I use my laptop in the CS Labs?"
      answer: "Yes, you can use the WiFi network that is available in all 3 CS Labs. Please do not unplugged the network cables from the PCs to plug in your laptops. Use the WiFi network!

          There are a few empty power outlets in the room.  Look for them! Do not unplugged the power cables from the PCs or monitors to charge your laptops, mobile devices, etc. There are also some power outlets in the hallway outside the CS Labs that you can use to charge your devices."

