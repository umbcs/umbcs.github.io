<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS Prerequisite Chart</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="{{ site.baseurl }}/WEB/academics/planner/planner.css">
    <script>const BASE_URL = '{{ site.baseurl }}';</script>
    <script src="{{ site.baseurl }}/WEB/academics/planner/planner-styles.js"></script>
    <script src="{{ site.baseurl }}/WEB/academics/planner/planner-api.js"></script>
    <script src="{{ site.baseurl }}/WEB/academics/planner/planner.js" defer></script>
</head>
<body>
    <div class="zoom-controls">
        <button class="zoom-button" id="zoom-in-button" title="Zoom In">+</button>
        <button class="zoom-button" id="zoom-out-button" title="Zoom Out">−</button>
        <button class="zoom-button" id="center-button" title="Center Chart" style="font-size: 14px;">⊕</button>
    </div>
    <div id="cy"></div>
    <div id="info">
        <div class="info-heading">
            <div>
                <h1 id="courseId"></h1>
                <p id="courseName"></p>
            </div>
            <button class="close-button" id="close-info">&times;</button>
        </div>

        <div class="info-content">
            <button class="button button-complete" id="button-complete" style="margin-bottom: 20px;">Mark as Completed</button>
            
            <div class="section">
                <h3 class="section-title">Credits</h3>
                <div class="credits">3 credits</div>
            </div>

            <div class="section" id="description-section">
                <h3 class="section-title">Description</h3>
                <p class="description-text" id="side-description">Description text goes here.</p>
            </div>

            <div class="section" id="prereq-section">
                <h3 class="section-title">Prerequisites</h3>
                <div class="prereq-text" id="side-prereq"><span>✓</span> MATH130</div>
            </div>

            <div class="section" id="unlocks-section">
                <h3 class="section-title">Unlocks These Courses</h3>
                <div class="unlocks-container" id="side-unlocks"></div>
            </div>
            <div class="section" id="offered-section" style="display: none;">
                <h3 class="section-title" style="margin-bottom: 16px;">Offered In:</h3>
                <div id="side-offered"></div>
            </div>
        </div>
        <div class="info-footer">
            <button class="button">Open Course Page</button>
        </div>
    </div>
</body>
</html>
