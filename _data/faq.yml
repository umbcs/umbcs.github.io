- category: "Email & Communication"
  questions:
    - question: "17: How do I find a CS/IT user email address?"
      answer: "From users.cs.umb.edu a.k.a pe15.cs.umb.edu, you can use the following 2 commands to find the UMB email address of your peers at the command prompt.

          The first command is the preferred method, and it is:

          $ u2c.sh   where '''' is the Linux login name.  The output will be of 2 forms:

          Firstname.LastnameXYZ@umb.edu, where XYZ are digits.

          Firstname.Lastname@umb.edu.

          The second command is:

          $ unix2campus 

          Both commands show the same output.

          You can use the mail client 'alpine' to send email on a CS Ubuntu host.

          $ alpine Firstname.LastnameXYZ@umb.edu or 
          $ alpine Firstname.Lastname@umb.edu"

    - question: "18: Email services."
      answer: "> CS/IT students must use their UMB email addresses.

          > CS/IT faculty emails that get delivered to the CS mail server can be forwarded to the faculty's UMB email address or can be read/managed with alpine, the Linux email client."

    - question: "19: Math and CS anti-spam"
      answer: "1. Systems Use Realtime Blackhole Lists (dnsrbl)

          Please know that we have recently become very much more aggressive in our anti-spam measures.  In particular, the mail daemons on the math and cs mail servers now decline to accept mail from hosts that are listed as bad guys by spamcop or spamhaus.

          Please see: 

          - [http://www.spamcop.net](http://www.spamcop.net)
          - [http://www.spamhaus.org](http://www.spamhaus.org)

          We now drop over 50,000 connections per day, drastically reducing the number of messages to be scanned for virus and spam.

          2. SpamAssassin 'spamd' Deployed

          We now have spamd running on three of the new SunFire 4200's under linux. There is a local script to invoke the spamc client side, and the prototypical '.procmailrc' file is updated to use it.
    
          Under the old setup, and for the near future, SpamAssassin is invoked by the sytem on each message that comes in. That sub-optimal method will be dropped about as soon as we can  suppose that everyone has changed over to spamc/spamd. 

          3. New Prototypical Procmailrc File

          If you already have a procmail filter set up, then you will want to merge it with, or replace it with, the latest recommendation. Please see '/usr/local/umb_proto_dot/.procmailrc'.

          If you do not have a procmail filter yet, you may install one by doing the following actions in the shell. You should review the procmailrc file **before** setting up your '.forward' file.

          cd
          mkdir -p .procmail
          mkdir -p mail
          echo '|/usr/local/bin/procmail #'$USER' > .forward
          chmod go-w . .procmail .procmailrc .forward

          At this point your '.forward' should contain, for example, '|/usr/local/bin/procmail#rickm|' -- including the double quotes and your username after the #.

          New mail will be sorted into one of the files 'mail/spam.*' or your system mailbox. If you want to be conservative initially, you can see where to change the code to save even high-score spam.

          You will want to watch your '~/.procmail/log' file to be sure that things are going as expected. Once you are comfortable, you will want to turn off verbosity in the '.procmailrc' file.

          Please report bugs by email to operator@cs.umb.edu."

    - question: "20: How to turn on automatic forwarding address of an UMB email account"
      answer: "Log onto webmail.umb.edu using your credentials. Under settings (the wheel symbol), search for the keyword 'forwarding'. This will bring you to the forwarding screen to set the forwarding address.

          At the top of the page, do:
          1. Select Settings (wheel) -> View all Outlook settings.
          2. Select Mail -> Forwarding.
          3. Select Enable forwarding, enter the forwarding email address.
          4. Select Save.

          Notes: 

          If you want a copy of the original message to remain in your mailbox, select Keep a copy of forwarded messages."

    - question: "21: How do I find someone’s email address?"
      answer: "Local users have the address username@cs.umb.edu. Faculty have aliases First.Last@cs.umb.edu. The finger program uses fuzzy matching against the passwd database, and is available on most of our hosts.

          You can use the following to send an email on a CS Ubuntu host from your CS email:

          $ alpine <username>@cs.umb.edu"

- category: "Technical Support & Web Development"
  questions:
    - question: "22: How do I create my homepage?"
      answer: "We support homepages addressed by http://www.cs.umb.edu/~username, where username is your UNIX login. Your homepage must be named index.html and be in a publicly readable directory named public_html under your home directory.

          Everything in your webpage is visible to everyone on the Internet. Do not put any personal information like phone number. Your email address should be in the format of name@cs.umb.edu."

    - question: "23: How do I fix my vt100 windows?"
      answer: "When you log in, you may have to tell UNIX what kind of terminal you are at, if you want things like emacs and vi to work correctly. Most folks use a PC running some ssh client such as putty. Most ssh client programs emulate (pretend to be) vt100 terminals. The vt100 was DEC’s popular implementation of the ANSI terminal spec. Check your comm program or its docs to see what your choices are. If you don’t know or care, then vt100 is the best choice. On the UNIX side, you can check the setting of terminal type by

        echo $TERM

        That should agree with your ssh client. If not, you can tell UNIX the terminal type being emulated, so:

        set TERM=vt100

        If you check your ~/.login file, you will see a section where the terminal type gets set. If that code isn’t getting your terminal type set correctly for you, you can comment it all out and replace it with one or more simple declarations that do.

        On some UNIX systems, the default behavior for tabs is to print them literally. If you see output all messy, tabs may not be agreeing with your terminal emulator. The command stty -tabs tells UNIX not to send literal tabs, but to expand them into a bunch of space characters. You can put that into your .login file if it works for you and you want that all the time. Window Size UNIX assumes a vt100 is 24 rows x 80 columns. If you like a larger window, you can adjust UNIX’s notion of its size with the script /usr/local/bin/fix.vt100. It takes an argument that is the number of rows (lines) in the window. For example, fix.vt100 35 fixes up a vt100 for 35 lines. The fix.vt100 command is a “self-documenting Bourne shell script.”"

    - question: "24: How do I write a CGI script?"
      answer: "Users may invoke CGI scripts from their home pages by following these guidelines:

          Make a script or program that prints good, legal HTML to its STDOUT. You should run your program under the shell and check its output before wiring it up into your home page. Until it gives good output you’d be wasting your time fooling with having the web server call it. Run weblint against it.

          Refer to your program by way of our CGI server. For example, http://cgi1.cs.umb.edu/~username/myprog.cgi. That hostname cgi1 is an alias for a box with a web server that can see your home page and is configured to run CGI programs. We don’t allow CGI to run on the main web server. That is so that in case some program goes nuts it won’t drag down the whole site.

          The error log of the httpd on cgi1 is /data/httpd_logs_cgi1/error_log. Users may read that file in pursuit of their errors.

          CGI scripts can introduce security holes or be CPU hogs. Please be very careful in using them: follow a good cookbook and do not “give away the store.” "

